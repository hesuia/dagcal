name: GUI release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Check dependency licenses
        run: cargo deny check licenses

  build-gui:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dagcal-gui-linux-x86_64
            binary_name: dagcal-gui
          - os: windows-latest
            artifact_name: dagcal-gui-windows-x86_64
            binary_name: dagcal-gui.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Build GUI
        run: cargo build -p dagcal-gui --profile dist-gui

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          mkdir package
          cp "target/dist-gui/${{ matrix.binary_name }}" package/
          cp LICENSE package/
          cd package
          zip -r "../${{ matrix.artifact_name }}.zip" .

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory package | Out-Null
          Copy-Item "target/dist-gui/${{ matrix.binary_name }}" package/
          Copy-Item LICENSE package/
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    needs: build-gui
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/dagcal-gui-linux-x86_64/dagcal-gui-linux-x86_64.zip \
            dist/dagcal-gui-windows-x86_64/dagcal-gui-windows-x86_64.zip \
            --generate-notes
